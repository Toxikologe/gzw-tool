<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZW Spearhead Tactical Tool</title>
    <style>
        :root { --accent: #ffae00; --bg: #0f0f0f; --card: #1c1c1c; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h1 { color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 2px solid var(--accent); display: inline-block; width: 100%; padding-bottom: 10px; }
        label { display: block; margin-top: 20px; font-weight: 600; color: #888; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        select { width: 100%; padding: 12px; margin-top: 8px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; appearance: none; cursor: pointer; font-size: 1rem; }
        select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 5px var(--accent); }
        .info-box { margin-top: 15px; padding: 20px; background: #252525; border-left: 4px solid var(--accent); border-radius: 4px; min-height: 60px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        .highlight { color: var(--accent); font-weight: bold; }
        .task-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; margin-top: 15px; width: 100%; transition: 0.2s; }
        .task-btn:hover { background: #e69d00; }
        .task-solution { display: none; margin-top: 15px; padding: 15px; background: #111; border: 1px dashed var(--accent); border-radius: 4px; }
        hr { border: 0; border-top: 1px solid #333; margin: 40px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>GZW Spearhead Tactical Tool</h1>

    <div class="grid">
        <div>
            <label for="weaponSelect">Waffen & Ballistik (Check)</label>
            <select id="weaponSelect" onchange="updateWeapon()">
    <option value="">-- Wähle eine Waffe --</option>
    <optgroup label="Sturmgewehre (West)">
        <option value="ks1">KAC KS-1 (L403A1) - 0.4 Meta</option>
        <option value="m4a1">M4A1</option>
        <option value="mk18">MK18 (Kompakt)</option>
        <option value="m16a1">M16A1 (Retro-Präzision)</option>
    </optgroup>
    <optgroup label="Sturmgewehre (Ost / AK)">
        <option value="akmn">AKMN (Modernisiert)</option>
        <option value="ak74n">AK-74N (5.45mm)</option>
        <option value="ak74m">AK-74M (Klappschaft)</option>
        <option value="ak103">AK-103 (7.62mm Modern)</option>
        <option value="ak105">AK-105 (Kompakt)</option>
        <option value="vz58">Vz. 58</option>
    </optgroup>
    <optgroup label="DMR & Scharfschützen">
        <option value="m14">M14 EBR / Battle Rifle</option>
        <option value="m700">M700 Remington</option>
        <option value="svd">SVD Dragunov</option>
        <option value="mosin">Mosin-Nagant (Standard/Infantry)</option>
        <option value="skn">SKS (Modernisiert)</option>
    </optgroup>
    <optgroup label="SMGs & Shotguns">
        <option value="mp5">MP5A3 / SD</option>
        <option value="vityaz">PP-19-01 Vityaz</option>
        <option value="m870">M870 Pump-Action</option>
        <option value="590a1">Mossberg 590A1</option>
    </optgroup>
    <optgroup label="Pistolen">
        <option value="alien">Laugo Alien</option>
        <option value="glock17">Glock 17</option>
        <option value="m9a1">M9A1 Beretta</option>
        <option value="makarov">Makarov PM</option>
    </optgroup>
</select>
            <div id="weaponInfo" class="info-box">Munitions-Details...</div>
        </div>

        <div>
            <label for="bossSelect">Boss-Datenbank (0.4 Update)</label>
            <select id="bossSelect" onchange="updateBoss()">
    <option value="">-- Wähle einen Boss --</option>
    <optgroup label="Startregionen">
        <option value="market_leader">Criminal Leader (Marktplatz)</option>
        <option value="lumber_boss">Lumber Yard Foreman</option>
        <option value="rebel_ybl">Rebel Leader (YBL-1 Bunker)</option>
    </optgroup>
    <optgroup label="Mid-Game POIs">
        <option value="hunter_commander">Hostile Commander (Hunter's Paradise)</option>
        <option value="malo_blue">Malo Luangrath (Blue Lagoon)</option>
        <option value="banpa_leader">Elder Leader (Ban Pa)</option>
    </optgroup>
    <optgroup label="End-Game & High Danger">
        <option value="fort_commander">General Pa (Fort Narith HQ)</option>
        <option value="midnight_laf">LAF Commander (Midnight Sapphire)</option>
        <option value="tiger_bay_unlra">UNLRA Officer (Tiger Bay HQ)</option>
        <option value="tiger_bay_pier">Pier Boss (Tiger Bay)</option>
        <option value="airfield_boss">Airfield Commander (Ground Zero)</option>
    </optgroup>
</select>
            <div id="bossInfo" class="info-box">Boss-Details & Loot...</div>
        </div>
    </div>

    <div class="grid">
        <div>
            <label for="attachSelect">Attachments & Ergo</label>
            <select id="attachSelect" onchange="updateGeneric('attachSelect', 'attachInfo')">
                <option value="">-- Wähle Attachment --</option>
                <option value="Vudu 1-6x / 3-9x: Absolute Meta-Optik. In 0.4 extrem wichtig für Distanzschüsse.">Vudu Scopes</option>
                <option value="RAZOR 1-10x: Neu in 0.4. Maximale Flexibilität für DMR-Builds.">RAZOR 1-10x Scope</option>
                <option value="Aimpoint 3X-P: Magnifier für Red Dots. Perfekt für das KS-1.">3X-P Magnifier</option>
                <option value="RK-3 Grip: Bester Ergo-Boost. Reduziert die Waffen-Trägheit massiv.">Zenit RK-3 Grip</option>
            </select>
            <div id="attachInfo" class="info-box">Attachment-Effekte...</div>
        </div>

        <div>
            <label for="gearSelect">Gear, Medic & Survival</label>
            <select id="gearSelect" onchange="updateGeneric('gearSelect', 'gearInfo')">
                <option value="">-- Wähle Item --</option>
                <option value="RPC Class 4: Bester Kompromiss aus Schutz und Gewicht (Inertia-Vorteil).">RPC Plate Carrier</option>
                <option value="6B45 Ratnik: Class 5 Schutz. Extrem schwer, behindert den Tactical Sprint.">6B45 Ratnik</option>
                <option value="Surkit / Blood Bag: Essenziell für Organ-Reparatur und Blutverlust.">Medical High-End</option>
                <option value="MRE & Water: Erhöht Energie- und Hydrations-Buffs für Ausdauer.">Survival Kits</option>
            </select>
            <div id="gearInfo" class="info-box">Gear-Stats...</div>
        </div>
    </div>

    <hr>

    <label for="taskSelect">Tasks & Lösungen (Wiki-Modus)</label>
    <select id="taskSelect" onchange="updateTask()">
        <option value="">-- Task auswählen --</option>
        <optgroup label="Anfänger-Tasks">
            <option value="first_recon">First Recon</option>
            <option value="little_bird">Little Bird Down</option>
            <option value="meds_wanted">Meds Wanted</option>
        </optgroup>
        <optgroup label="POI Tasks">
            <option value="native_neg">Native Negotiations (Ban Pa)</option>
            <option value="cache_retrieval">Cache Retrieval (Warehouse)</option>
            <option value="shadow_banpa">Shadow Over Ban Pa</option>
        </optgroup>
    </select>
    <div id="taskContainer" class="info-box">
        <div id="taskTitle" style="font-weight:bold; margin-bottom: 5px;">Wähle einen Task...</div>
        <div id="taskDesc">Beschreibung des Ziels erscheint hier.</div>
        <button class="task-btn" id="solBtn" style="display:none;" onclick="toggleSolution()">LÖSUNG ANZEIGEN</button>
        <div id="taskSolution" class="task-solution"></div>
    </div>

</div>

<script>
    // Vollständige Datenbank
    const weapons = {
    // Sturmgewehre West
    "ks1": { ammo: "5.56x45mm M855A1", pen: "Class 4", tip: "0.4 Meta. Extrem leise mit Suppressor und bester Ergo-Wert." },
    "m4a1": { ammo: "5.56x45mm M855A1", pen: "Class 3+", tip: "Allrounder. Nutze den 10.3-Zoll Lauf für bessere Mobilität." },
    "mk18": { ammo: "5.56x45mm M855A1", pen: "Class 3+", tip: "Ideal für CQB. Sehr kurzes Profil, perfekt für Gebäude-Raids." },
    "m16a1": { ammo: "5.56x45mm M193 / M855", pen: "Class 3", tip: "Hohe Mündungsgeschwindigkeit sorgt für weniger Bullet-Drop auf Distanz." },

    // Sturmgewehre Ost
    "akmn": { ammo: "7.62x39mm BP", pen: "Class 4", tip: "Der Klassiker. Mit BP-Munition extrem gefährlich gegen Class 3+ Westen." },
    "ak74n": { ammo: "5.45x39mm 7N6M / PP", pen: "Class 3", tip: "Sehr geringer Rückstoß. Präziser als die 7.62er Varianten." },
    "ak74m": { ammo: "5.45x39mm PP / BP", pen: "Class 3+", tip: "Modernisierte AK-74. Geringes Gewicht, gute Trägheits-Werte." },
    "ak103": { ammo: "7.62x39mm BP", pen: "Class 4", tip: "Beste 7.62er AK. Kann alle modernen Aufsätze nutzen." },
    "ak105": { ammo: "5.45x39mm PP", pen: "Class 3", tip: "Kurze AK-Variante. Perfekt für das neue Bewegungssystem." },
    "vz58": { ammo: "7.62x39mm PS / BP", pen: "Class 3+", tip: "Keine AK! Nutzt eigene Magazine. Höhere Feuerrate als die AKMN." },

    // DMR & Sniper
    "m14": { ammo: "7.62x51mm M80 / M61", pen: "Class 4-6", tip: "Dominante Waffe in 0.4. M80 für KI, M61 für High-End Player Armor." },
    "m700": { ammo: "7.62x51mm M61", pen: "Class 6", tip: "Repetiergewehr. Erfordert Disziplin, aber ignoriert fast jede Rüstung." },
    "svd": { ammo: "7.62x54mmR 7N1", pen: "Class 5", tip: "Sehr laut! Zieht KI-Horden an, aber tötet fast alles mit einem Brusttreffer." },
    "mosin": { ammo: "7.62x54mmR SNB", pen: "Class 6", tip: "Günstig und tödlich. SNB-Munition schlägt durch jeden Helm im Spiel." },
    "skn": { ammo: "7.62x39mm BP", pen: "Class 4", tip: "Modernisierte SKS. Präziser als die AK, ideal für Unterdrückungsfeuer." },

    // SMG & Shotguns
    "mp5": { ammo: "9x19mm AP 6.3 / 7N21", pen: "Class 2+", tip: "Ein Laser auf kurze Distanz. Ziele auf den Kopf oder Beine." },
    "vityaz": { ammo: "9x19mm 7N21", pen: "Class 2+", tip: "Russische SMG. Nutzt AK-Aufsätze für hohe Ergonomie." },
    "m870": { ammo: "12G Slug / 00 Buck", pen: "Class 0-2", tip: "In 0.4 sind Slugs gegen weiche Ziele (KI ohne Platten) verheerend." },
    "590a1": { ammo: "12G 00 Buckshot", pen: "Class 0-1", tip: "Maximale Stopwirkung auf 5-10 Meter." },

    // Pistolen
    "alien": { ammo: "9x19mm 7N21", pen: "Class 2+", tip: "Extrem schnell im ADS. Beste Zweitwaffe für Scharfschützen." },
    "glock17": { ammo: "9x19mm PST Gzh", pen: "Class 1+", tip: "Zuverlässig, große Magazine verfügbar." },
    "m9a1": { ammo: "9x19mm PST Gzh", pen: "Class 1+", tip: "Gute Standard-Pistole für den Start." },
    "makarov": { ammo: "9x18mm PM Gzh", pen: "Class 0", tip: "Nur im absoluten Notfall. Hat kaum Durchschlagskraft gegen Rüstung." }
};

    const bosses = {
    // Startregionen
    "market_leader": { loc: "Marktplatz / Rathaus (Startstadt)", gear: "Engraved AKMN / SKS", loot: "Büroschlüssel, gravierte AK.", tip: "Hält sich oft im Obergeschoss des Rathauses oder hinter dem Markt auf." },
    "lumber_boss": { loc: "Lumber Yard (Sägewerk)", gear: "Mosin / AK-74N", loot: "Lumber Yard Office Key.", tip: "Patrouilliert zwischen den Holzstapeln. Hat gute Sichtlinien auf Distanz." },
    "rebel_ybl": { loc: "YBL-1 (Bunker-Eingang oder Ebene -2)", gear: "AK-103 Custom", loot: "Bunker-Generalschlüssel, seltene AK-Mods.", tip: "Vorsicht in den engen Gängen, er nutzt oft Blendgranaten." },

    // Mid-Game
    "hunter_commander": { loc: "Hunter's Paradise (Schießstand/Waffenlager)", gear: "M4A1 Custom / Fast MT", loot: "Braunes Barett, Key to Weapon Storage.", tip: "Die Leibwache nutzt oft Schalldämpfer. Bleib in Bewegung." },
    "malo_blue": { loc: "Blue Lagoon (Restaurant/Steg)", gear: "SVD / Mosin", loot: "Malo's Key, Scharfschützengewehr.", tip: "Er schießt extrem präzise auf hohe Distanz über das Wasser." },
    "banpa_leader": { loc: "Ban Pa (Zentrum am See)", gear: "SKS / AKM", loot: "Ban Pa Shack Key, wertvolle Statuen.", tip: "Das Dorf ist sehr verwinkelt. Nutze Granaten, um ihn aus den Hütten zu treiben." },

    // End-Game
    "fort_commander": { loc: "Fort Narith (HQ Gebäude, oberster Stock)", gear: "Class 5 Armor / M14 EBR", loot: "Fort Narith Storage Key, gravierte Pistole.", tip: "Der zäheste Boss. Erfordert zwingend AP-Munition (M61 / SNB)." },
    "midnight_laf": { loc: "Midnight Sapphire (Hotel/Villen)", gear: "KS-1 Custom / Class 4+", loot: "Villen-Schlüssel, High-End Optiken.", tip: "Wird von 4-6 Elitesoldaten geschützt. Greife niemals frontal an." },
    "tiger_bay_unlra": { loc: "Tiger Bay (UNLRA Quarantäne-Zone)", gear: "M4A1 / Class 5", loot: "UNLRA Medical Key.", tip: "Tiger Bay hat die höchste KI-Dichte. Bring massiv Munition mit." },
    "tiger_bay_pier": { loc: "Tiger Bay (Pier/Einkaufszentrum)", gear: "AK-103 / Drum Mags", loot: "Pier Storage Key.", tip: "Er nutzt Magazine mit hoher Kapazität. Warte auf seine Nachladepause." },
    "airfield_boss": { loc: "Ground Zero (Airfield Hangar)", gear: "Voll modifizierte Waffen / Class 6", loot: "Seltene Prototyp-Teile.", tip: "Nur für eingespielte Squads. KI nutzt hier oft Thermal-Optiken." }
};

    const tasks = {
        "first_recon": { desc: "Erkunde Markt, Tankstelle und Rathaus.", sol: "Markt (141 162), Tankstelle (143 160), Rathaus (141 164)." },
        "little_bird": { desc: "Finde den Hubschrauber-Absturzplatz.", sol: "Nördlich der Stadt im Sumpf. Cockpit-Panel anklicken." },
        "meds_wanted": { desc: "Finde UNLRA Hilfsgüter.", sol: "Wasserturm Stadtrand, Kiste steht am Fundament." },
        "native_neg": { desc: "Bringe Paket zum Ältesten (Ban Pa).", sol: "Paket aus Kirche holen, zum Haus mit blauer Flagge am Wasser." },
        "cache_retrieval": { desc: "Markiere Container im Lagerhaus.", sol: "GPS-Tracker von Gunny nutzen. Lagerhaus Südost-Industriezone." },
        "shadow_banpa": { desc: "Infos über Miliz in Ban Pa finden.", sol: "Lagerhaus Nord-Steg, Dokument auf grünem Tisch oben." }
    };

    // FUNKTIONEN
    function updateWeapon() {
        const val = document.getElementById('weaponSelect').value;
        const info = weapons[val];
        const display = document.getElementById('weaponInfo');
        if (info) {
            display.innerHTML = `Ammo: <span class="highlight">${info.ammo}</span><br>Pen: <span class="highlight">${info.pen}</span><br>Tipp: ${info.tip}`;
        } else {
            display.innerHTML = "Wähle eine Waffe...";
        }
    }

    function updateBoss() {
        const val = document.getElementById('bossSelect').value;
        const boss = bosses[val];
        const display = document.getElementById('bossInfo');
        if (boss) {
            display.innerHTML = `Ort: <span class="highlight">${boss.loc}</span><br>Loot: ${boss.loot}<br>Tipp: ${boss.tip}`;
        } else {
            display.innerHTML = "Wähle einen Boss...";
        }
    }

    function updateTask() {
        const val = document.getElementById('taskSelect').value;
        const task = tasks[val];
        if(task) {
            document.getElementById('taskTitle').innerHTML = val.replace(/_/g, ' ').toUpperCase();
            document.getElementById('taskDesc').innerHTML = task.desc;
            document.getElementById('taskSolution').innerHTML = `<strong>Wiki-Lösung:</strong><br>${task.sol}`;
            document.getElementById('solBtn').style.display = 'block';
            document.getElementById('taskSolution').style.display = 'none';
        }
    }

    function updateGeneric(sId, iId) {
        const val = document.getElementById(sId).value;
        document.getElementById(iId).innerHTML = val || "Details...";
    }

    function toggleSolution() {
        const s = document.getElementById('taskSolution');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
    }
</script>
